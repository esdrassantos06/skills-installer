<svg width="256" height="256" viewBox="0 0 256 256" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Skills Installer logo">
  <title>Skills Installer</title>

  <!-- Rounded square tile (macOS / iOS icon mask compatible) -->
  <rect width="256" height="256" rx="56" fill="#0a0b0e"/>

  <!-- Subtle corner glow -->
  <circle cx="32" cy="32" r="140" fill="#7aa2ff" fill-opacity="0.06"/>

  <!-- Geometric S monogram, single zig-zag stroke -->
  <path d="M 188 76 L 68 76 L 68 128 L 188 128 L 188 180 L 68 180"
        stroke="#7aa2ff" stroke-width="32" stroke-linejoin="miter" fill="none"/>

  <!-- Status dot at the trailing edge of the S — ties to app's "installed" semantic -->
  <circle cx="52" cy="180" r="9" fill="#7ee2a8"/>
</svg>
