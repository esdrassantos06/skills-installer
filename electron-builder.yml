appId: com.esdras.skills-installer
productName: Skills Installer
directories:
  output: dist
  buildResources: assets/icons
files:
  - out/**/*
  - package.json
mac:
  target:
    - target: dmg
      arch: [arm64, x64]
  category: public.app-category.developer-tools
  icon: assets/icons/icon.png
win:
  target:
    - target: nsis
      arch: [x64]
  icon: assets/icons/icon.png
linux:
  target:
    - target: AppImage
      arch: [x64]
  icon: assets/icons/icon.png
  category: Development
nsis:
  oneClick: false
  allowToChangeInstallationDir: true
