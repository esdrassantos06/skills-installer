name: Feature request
description: Suggest a new feature or improvement
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: What's the problem
      description: What are you trying to do that doesn't work today? Skip the solution, focus on the pain.
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: What you'd like
      description: A rough idea of the shape of the solution. UI mockup if helpful.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives you considered
      description: Workarounds, other tools, why they fall short.
