name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Verify lockfile is in sync with package.json
        if: matrix.os == 'ubuntu-latest'
        run: |
          npm install --package-lock-only --ignore-scripts
          if ! git diff --exit-code package-lock.json; then
            echo "::error::package-lock.json is out of sync with package.json."
            echo "::error::Run 'npm install' locally and commit the updated lockfile."
            exit 1
          fi

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build (electron-vite)
        run: npm run build
